---
apiVersion: v1
kind: Service
metadata:
  name: valkey-cache
  namespace: malcolm
spec:
  type: ClusterIP
  ports:
    - port: 6379
      protocol: TCP
      name: valkey
  selector:
    app: valkey-cache

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-cache-deployment
  namespace: malcolm
  labels:
    app: valkey-cache
    role: database
spec:
  selector:
    matchLabels:
      app: valkey-cache
  replicas: 1
  template:
    metadata:
      labels:
        app: valkey-cache
        role: database
    spec:
      containers:
      - name: valkey-cache-container
        image: ghcr.io/idaholab/malcolm/valkey:26.06.0
        imagePullPolicy: Always
        stdin: false
        tty: true
        command: ["/sbin/tini"]
        args: ["--",
               "/usr/local/bin/docker-uid-gid-setup.sh",
               "/usr/local/bin/service_check_passthrough.sh",
               "-s",
               "valkey-cache",
               "sh",
               "-c",
               "valkey-server --save '' --appendonly no --maxmemory $(VALKEY_CACHE_MAXMEMORY) --maxmemory-policy $(VALKEY_CACHE_MAXMEMORY_POLICY) --maxmemory-samples 10 --lazyfree-lazy-eviction yes --requirepass $(VALKEY_PASSWORD)"]
        ports:
          - name: valkey
            protocol: TCP
            containerPort: 6379
        envFrom:
          - configMapRef:
              name: process-env
          - configMapRef:
              name: ssl-env
          - secretRef:
              name: valkey-env
        livenessProbe:
          exec:
            command:
            - /usr/local/bin/container_health.sh
          initialDelaySeconds: 45
          periodSeconds: 60
          timeoutSeconds: 15
          successThreshold: 1
          failureThreshold: 10
        volumeMounts:
          - mountPath: /var/local/ca-trust/configmap
            name: valkey-cache-var-local-catrust-volume
      volumes:
        - name: valkey-cache-var-local-catrust-volume
          configMap:
            name: var-local-catrust
